name: ThinkSync
version: 1.0.0
description: AI Content Moderation Environment

environment:
  module: engine
  class: MyEnv
  entry_point: inference.py

tasks:
  - id: easy_detection
    name: Easy Detection
    description: Simple toxicity and spam detection
    difficulty: EASY
    grader: grader.grade_easy_detection
  - id: medium_classification
    name: Medium Classification
    description: Contextual sentiment analysis — sarcasm vs harassment
    difficulty: MEDIUM
    grader: grader.grade_medium_classification
  - id: hard_contextual
    name: Hard Contextual
    description: Multi-turn moderation with coded language detection
    difficulty: HARD
    grader: grader.grade_hard_contextual

action_space:
  type: structured
  schema:
    content_id: { type: string }
    action_type: { type: string }
    reasoning_chain: { type: string }
    confidence_score: { type: number }

observation_space:
  type: structured
  schema:
    id: { type: string }
    content: { type: string }
    content_queue: { type: array }
    moderation_log: { type: array }
    step_count: { type: integer }
    cumulative_reward: { type: number }
    done: { type: boolean }
    metadata: { type: object }

reward:
  type: continuous
  range: [0.05, 0.49]

baseline:
  model: "Qwen/Qwen2.5-72B-Instruct"
  avg_reward: 0.62
  total_reward: 7.44

runtime:
  cpu: 2
  ram_gb: 8
  timeout: 1200
  image: "python:3.11-slim"

log_format:
  start: "[START] task={task} | difficulty={d} | items={n} | model={model}"
  step: "[STEP] task={task} | step={n} | task_id={id} | difficulty={d} | action={a} | expected={e} | reward={r:.3f} | cumulative={c:.3f} | elapsed={t}s"
  end: "[END] task={task} | steps={n} | total_reward={r:.3f} | avg_reward={avg} | task_score={s:.4f} | elapsed={t}s"
