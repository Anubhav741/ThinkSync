name: ThinkSync
version: 1.0.0
description: AI Content Moderation Environment

environment:
  module: engine
  class: MyEnv
  entry_point: inference.py

tasks:
  - id: T001
    name: Easy Toxicity
    difficulty: EASY
  - id: T002
    name: Medium Context
    difficulty: MEDIUM
  - id: T003
    name: Hard Coded
    difficulty: HARD

action_space:
  type: structured
  schema:
    content_id: { type: string }
    action_type: { type: string }
    reasoning_chain: { type: string }
    confidence_score: { type: number }

observation_space:
  type: structured
  schema:
    content_queue: { type: array }
    moderation_log: { type: array }
    step_count: { type: integer }
    cumulative_reward: { type: number }
    episode_active: { type: boolean }

reward:
  type: continuous
  range: [-0.2, 1.0]

baseline:
  model: "Qwen/Qwen2.5-72B-Instruct"
  avg_reward: 0.62
  total_reward: 7.44

runtime:
  cpu: 2
  ram_gb: 8
  timeout: 1200
  image: "python:3.11-slim"

log_format:
  start: "[START] {name} inference started. Tasks: {n}, Model: {model}"
  step: "[STEP] step={n} | task_id={id} | difficulty={d} | action={a} | expected={e} | reward={r:.3f} | cumulative={c:.3f} | elapsed={t}s"
  end: "[END] steps={n} | total_reward={r:.3f} | avg_reward={avg} | elapsed={t}s"
